services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
      args:
        - NEXT_PUBLIC_AWS_REGION=${NEXT_PUBLIC_AWS_REGION:-eu-west-3}
        - NEXT_PUBLIC_AWS_USER_POOL_ID=${NEXT_PUBLIC_AWS_USER_POOL_ID:-eu-west-3_CIPlaceholder}
        - NEXT_PUBLIC_AWS_CLIENT_ID=${NEXT_PUBLIC_AWS_CLIENT_ID:-cipalaceholder}
        - NEXT_PUBLIC_AWS_COGNITO_DOMAIN=${NEXT_PUBLIC_AWS_COGNITO_DOMAIN:-placeholder.auth.eu-west-3.amazoncognito.com}
    environment:
      - NEXT_PUBLIC_IS_BETA_TEST=true
      - NEXT_PUBLIC_IS_PROD=false
      - NEXT_PUBLIC_GATEWAY_URL=http://gateway:8000
    command: ["sh", "-c", "sleep infinity"]
    networks: [app-network]
    depends_on: [gateway]

  cypress:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
      args:
        - NEXT_PUBLIC_AWS_REGION=${NEXT_PUBLIC_AWS_REGION:-eu-west-3}
        - NEXT_PUBLIC_AWS_USER_POOL_ID=${NEXT_PUBLIC_AWS_USER_POOL_ID:-eu-west-3_CIPlaceholder}
        - NEXT_PUBLIC_AWS_CLIENT_ID=${NEXT_PUBLIC_AWS_CLIENT_ID:-cipalaceholder}
        - NEXT_PUBLIC_AWS_COGNITO_DOMAIN=${NEXT_PUBLIC_AWS_COGNITO_DOMAIN:-placeholder.auth.eu-west-3.amazoncognito.com}
    working_dir: /app
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://gateway:8000
    entrypoint: >
      sh -c "npm run build &&
             npm run start &
             echo 'Waiting for Next.js server…' &&
             sleep 10 &&
             xvfb-run --auto-servernum --server-args='-screen 0 1280x720x24' \
               npx cypress run --config baseUrl=http://localhost:3000"
    depends_on:
      - gateway
      - admin-service
      - user-service
      - scan-service
      - scan-worker
      - crawl-service
      - crawl-worker
      - postgres
    networks: [app-network]

  gateway:
    build:
      context: ./backend
      dockerfile: gateway/Dockerfile
      args:
        INSTALL_DEV_DEPS: "true"
    environment:
      - IS_DOCKER=true
      - ADMIN_METRICS_API_KEY=${ADMIN_METRICS_API_KEY:-dev-admin-metrics-key}
      - PDF_SERVICE_INTERNAL_API_KEY=${PDF_SERVICE_INTERNAL_API_KEY:-}
      - COGNITO_REGION=${COGNITO_REGION:-eu-west-3}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID:-test-user-pool-id}
    networks: [app-network]
    depends_on:
      admin-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      scan-service:
        condition: service_healthy
      crawl-service:
        condition: service_healthy
      pdf-service:
        condition: service_healthy
      postgres:
        condition: service_healthy

  admin-service:
    build:
      context: ./backend
      dockerfile: admin-service/Dockerfile
      args:
        INSTALL_DEV_DEPS: "true"
    environment:
      - IS_DOCKER=true
      - ADMIN_METRICS_API_KEY=${ADMIN_METRICS_API_KEY:-dev-admin-metrics-key}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
    networks: [app-network]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/api/health')\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  user-service:
    build:
      context: ./backend
      dockerfile: user-service/Dockerfile
      args:
        INSTALL_DEV_DEPS: "true"
    environment:
      - IS_DOCKER=true
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - SCAN_SERVICE_URL=http://scan-service:8012
      - SCAN_SERVICE_INTERNAL_API_KEY=${SCAN_SERVICE_INTERNAL_API_KEY:-}
      - ADMIN_SERVICE_URL=http://admin-service:8010
      - ADMIN_SERVICE_INTERNAL_API_KEY=${ADMIN_SERVICE_INTERNAL_API_KEY:-}
      - SCHEDULED_SCAN_INITIAL_DELAY_SECONDS=${SCHEDULED_SCAN_INITIAL_DELAY_SECONDS:-60}
      - SCHEDULED_SCAN_INTERVAL_SECONDS=${SCHEDULED_SCAN_INTERVAL_SECONDS:-300}
    networks: [app-network]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8011/api/health')\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  scan-service:
    build:
      context: ./backend
      dockerfile: scan-service/Dockerfile
      args:
        INSTALL_DEV_DEPS: "true"
    environment:
      - IS_DOCKER=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - SCAN_SERVICE_INTERNAL_API_KEY=${SCAN_SERVICE_INTERNAL_API_KEY:-}
      - PDF_SERVICE_URL=http://pdf-service:8013
      - PDF_SERVICE_INTERNAL_API_KEY=${PDF_SERVICE_INTERNAL_API_KEY:-}
      - ASYNC_JOB_TOKEN_SECRET=${ASYNC_JOB_TOKEN_SECRET:-dev-async-job-secret}
    networks: [app-network]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8012/api/health')\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  scan-worker:
    build:
      context: ./backend
      dockerfile: scan-service/Dockerfile
      args:
        INSTALL_DEV_DEPS: "true"
    command: ["python", "-m", "app.workers.async_scan_worker"]
    environment:
      - IS_DOCKER=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - ASYNC_JOB_TOKEN_SECRET=${ASYNC_JOB_TOKEN_SECRET:-dev-async-job-secret}
    networks: [app-network]
    depends_on:
      scan-service:
        condition: service_healthy
      postgres:
        condition: service_healthy

  crawl-service:
    build:
      context: ./backend
      dockerfile: crawl-service/Dockerfile
      args:
        INSTALL_DEV_DEPS: "true"
    environment:
      - IS_DOCKER=true
      - IS_PROD=false
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - ASYNC_JOB_TOKEN_SECRET=${ASYNC_JOB_TOKEN_SECRET:-dev-async-job-secret}
    networks: [app-network]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8014/api/health')\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  crawl-worker:
    build:
      context: ./backend
      dockerfile: crawl-service/Dockerfile
      args:
        INSTALL_DEV_DEPS: "true"
    command: ["python", "-m", "app.workers.async_crawl_worker"]
    environment:
      - IS_DOCKER=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - ASYNC_JOB_TOKEN_SECRET=${ASYNC_JOB_TOKEN_SECRET:-dev-async-job-secret}
    networks: [app-network]
    depends_on:
      crawl-service:
        condition: service_healthy
      postgres:
        condition: service_healthy

  pdf-service:
    build:
      context: ./backend
      dockerfile: pdf-service/Dockerfile
      args:
        INSTALL_DEV_DEPS: "true"
    environment:
      - IS_DOCKER=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - PDF_SERVICE_INTERNAL_API_KEY=${PDF_SERVICE_INTERNAL_API_KEY:-}
    networks: [app-network]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8013/api/health')\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  postgres:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-template_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - ./docker/initdb.d:/docker-entrypoint-initdb.d:ro
    networks: [app-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s



networks:
  app-network:
    driver: bridge
