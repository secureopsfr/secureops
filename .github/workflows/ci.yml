name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Build - Lint & Formatting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # Vérifier que les Dockerfiles requis existent (contexte = répertoire du workflow)
      - name: Verify Dockerfiles exist
        run: |
          echo "Working directory: $(pwd)"
          test -f frontend/Dockerfile || { echo "Missing frontend/Dockerfile"; exit 1; }
          test -f backend/scan-service/Dockerfile || { echo "Missing backend/scan-service/Dockerfile"; exit 1; }
          test -f backend/crawl-service/Dockerfile || { echo "Missing backend/crawl-service/Dockerfile"; exit 1; }
          test -f backend/pdf-service/Dockerfile || { echo "Missing backend/pdf-service/Dockerfile"; exit 1; }
          (test -f backend/gateway/Dockerfile && test -f backend/admin-service/Dockerfile) || true

      # Build & démarrage de la stack
      - name: Start full stack
        shell: bash
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
          BUILDKIT_PROGRESS: plain
        run: |
          docker compose -f docker-compose.ci.yml up -d --build
          docker compose -f docker-compose.ci.yml ps
          # Si user-service a déjà crashé, afficher les logs et échouer immédiatement
          status_early=$(docker compose -f docker-compose.ci.yml ps -q user-service 2>/dev/null | xargs -r docker inspect -f '{{.State.Status}}' 2>/dev/null || echo "")
          if [ "$status_early" = "exited" ]; then
            echo "user-service exited during startup. Status/inspect:"
            docker compose -f docker-compose.ci.yml ps user-service 2>/dev/null || true
            cid=$(docker compose -f docker-compose.ci.yml ps -q user-service 2>/dev/null)
            [ -n "$cid" ] && docker inspect "$cid" 2>/dev/null || true
            echo "user-service logs:"
            docker compose -f docker-compose.ci.yml logs --no-color --tail=300 user-service 2>/dev/null || true
            exit 1
          fi
          docker compose -f docker-compose.ci.yml logs --no-color --tail=300 user-service || true
          # Attente de la disponibilité de Postgres
          until docker compose -f docker-compose.ci.yml exec -T postgres pg_isready -U user -d template_db; do
            echo "Waiting for Postgres…"; sleep 2
          done
          # Attente admin-service (migrations + health)
          echo "Waiting for admin-service..."
          for i in $(seq 1 30); do
            cid=$(docker compose -f docker-compose.ci.yml ps -q admin-service 2>/dev/null)
            status=$([ -n "$cid" ] && docker inspect -f '{{.State.Status}}' "$cid" 2>/dev/null || echo "missing")
            if [ "$status" = "missing" ]; then
              echo "admin-service container not found (build may have failed)."
              docker compose -f docker-compose.ci.yml logs admin-service 2>/dev/null || true
              exit 1
            fi
            if [ "$status" = "exited" ]; then
              echo "admin-service has exited. Logs:"
              docker compose -f docker-compose.ci.yml logs admin-service || true
              exit 1
            fi
            if docker compose -f docker-compose.ci.yml exec -T admin-service python -c "import urllib.request; urllib.request.urlopen('http://localhost:8010/api/health')" 2>/dev/null; then
              echo "admin-service is up"; break
            fi
            if [ "$i" -eq 30 ]; then
              echo "admin-service did not become ready. Logs:"
              docker compose -f docker-compose.ci.yml logs admin-service || true
              exit 1
            fi
            sleep 2
          done

          # Attente user-service (migrations + health)
          echo "Waiting for user-service..."
          for i in $(seq 1 30); do
            cid=$(docker compose -f docker-compose.ci.yml ps -q user-service 2>/dev/null)
            status=$([ -n "$cid" ] && docker inspect -f '{{.State.Status}}' "$cid" 2>/dev/null || echo "missing")
            if [ "$status" = "missing" ]; then
              echo "user-service container not found (build may have failed)."
              docker compose -f docker-compose.ci.yml logs user-service 2>/dev/null || true
              exit 1
            fi
            if [ "$status" = "exited" ]; then
              echo "user-service has exited. Status/inspect:"
              docker compose -f docker-compose.ci.yml ps user-service 2>/dev/null || true
              [ -n "$cid" ] && docker inspect "$cid" 2>/dev/null || true
              echo "user-service logs:"
              docker compose -f docker-compose.ci.yml logs --no-color --tail=300 user-service 2>/dev/null || true
              exit 1
            fi
            if docker compose -f docker-compose.ci.yml exec -T user-service python -c "import urllib.request; urllib.request.urlopen('http://localhost:8011/api/health')" 2>/dev/null; then
              echo "user-service is up"; break
            fi
            if [ "$i" -eq 30 ]; then
              echo "user-service did not become ready. Logs:"
              docker compose -f docker-compose.ci.yml logs user-service || true
              exit 1
            fi
            sleep 2
          done

          # Attente scan-service (migrations + health)
          echo "Waiting for scan-service..."
          for i in $(seq 1 30); do
            cid=$(docker compose -f docker-compose.ci.yml ps -q scan-service 2>/dev/null)
            status=$([ -n "$cid" ] && docker inspect -f '{{.State.Status}}' "$cid" 2>/dev/null || echo "missing")
            if [ "$status" = "missing" ]; then
              echo "scan-service container not found (build may have failed)."
              docker compose -f docker-compose.ci.yml logs scan-service 2>/dev/null || true
              exit 1
            fi
            if [ "$status" = "exited" ]; then
              echo "scan-service has exited. Logs:"
              docker compose -f docker-compose.ci.yml logs scan-service || true
              exit 1
            fi
            if docker compose -f docker-compose.ci.yml exec -T scan-service python -c "import urllib.request; urllib.request.urlopen('http://localhost:8012/api/health')" 2>/dev/null; then
              echo "scan-service is up"; break
            fi
            if [ "$i" -eq 30 ]; then
              echo "scan-service did not become ready. Logs:"
              docker compose -f docker-compose.ci.yml logs scan-service || true
              exit 1
            fi
            sleep 2
          done

          # Attente crawl-service (health)
          echo "Waiting for crawl-service..."
          for i in $(seq 1 30); do
            cid=$(docker compose -f docker-compose.ci.yml ps -q crawl-service 2>/dev/null)
            status=$([ -n "$cid" ] && docker inspect -f '{{.State.Status}}' "$cid" 2>/dev/null || echo "missing")
            if [ "$status" = "missing" ]; then
              echo "crawl-service container not found (build may have failed)."
              docker compose -f docker-compose.ci.yml logs crawl-service 2>/dev/null || true
              exit 1
            fi
            if [ "$status" = "exited" ]; then
              echo "crawl-service has exited. Logs:"
              docker compose -f docker-compose.ci.yml logs crawl-service || true
              exit 1
            fi
            if docker compose -f docker-compose.ci.yml exec -T crawl-service python -c "import urllib.request; urllib.request.urlopen('http://localhost:8014/api/health')" 2>/dev/null; then
              echo "crawl-service is up"; break
            fi
            if [ "$i" -eq 30 ]; then
              echo "crawl-service did not become ready. Logs:"
              docker compose -f docker-compose.ci.yml logs crawl-service || true
              exit 1
            fi
            sleep 2
          done

          # Attente pdf-service (health)
          echo "Waiting for pdf-service..."
          for i in $(seq 1 30); do
            cid=$(docker compose -f docker-compose.ci.yml ps -q pdf-service 2>/dev/null)
            status=$([ -n "$cid" ] && docker inspect -f '{{.State.Status}}' "$cid" 2>/dev/null || echo "missing")
            if [ "$status" = "missing" ]; then
              echo "pdf-service container not found (build may have failed)."
              docker compose -f docker-compose.ci.yml logs pdf-service 2>/dev/null || true
              exit 1
            fi
            if [ "$status" = "exited" ]; then
              echo "pdf-service has exited. Logs:"
              docker compose -f docker-compose.ci.yml logs pdf-service || true
              exit 1
            fi
            if docker compose -f docker-compose.ci.yml exec -T pdf-service python -c "import urllib.request; urllib.request.urlopen('http://localhost:8013/api/health')" 2>/dev/null; then
              echo "pdf-service is up"; break
            fi
            if [ "$i" -eq 30 ]; then
              echo "pdf-service did not become ready. Logs:"
              docker compose -f docker-compose.ci.yml logs pdf-service || true
              exit 1
            fi
            sleep 2
          done

      # Lint Python + JS
      - name: Python Lint & Formatting
        run: |
          for svc in gateway admin-service user-service scan-service crawl-service pdf-service; do
            docker compose -f docker-compose.ci.yml exec -T $svc black --check .
            docker compose -f docker-compose.ci.yml exec -T $svc isort --check-only .
            docker compose -f docker-compose.ci.yml exec -T $svc flake8 .
          done

      - name: Python Tests (pytest)
        run: |
          for svc in gateway admin-service user-service scan-service crawl-service pdf-service; do
            echo "Running pytest in $svc..."
            docker compose -f docker-compose.ci.yml exec -T $svc pytest
          done

      - name: JS Lint & Prettier
        run: docker compose -f docker-compose.ci.yml exec -T frontend npm run lint

      - name: JS Tests (Jest)
        run: docker compose -f docker-compose.ci.yml exec -T frontend npm run test

      # Teardown : nettoyage des conteneurs
      - name: Teardown full stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down --volumes
