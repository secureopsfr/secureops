services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: immosphere-gateway
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      - IS_DOCKER=true
      - ADMIN_METRICS_API_KEY=${ADMIN_METRICS_API_KEY:-changeme-in-production}
      - DISABLE_AUTH_MIDDLEWARE=${DISABLE_AUTH_MIDDLEWARE:-false}
      - AWS_REGION=${AWS_REGION:-eu-west-3}
      - COGNITO_REGION=${COGNITO_REGION:-eu-west-3}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      admin-service:
        condition: service_started
      user-service:
        condition: service_started
      scan-service:
        condition: service_started
      crawl-service:
        condition: service_started
      pdf-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admin-service:
    build:
      context: .
      dockerfile: admin-service/Dockerfile
    container_name: immosphere-admin
    ports:
      - "${ADMIN_PORT:-8010}:8010"
    environment:
      - IS_DOCKER=true
      - IS_PROD=true
      - DATABASE_URL=${RDS_ADMIN_DATABASE_URL}
      - ADMIN_METRICS_API_KEY=${ADMIN_METRICS_API_KEY:-changeme-in-production}
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: immosphere-user-service
    ports:
      - "${USER_PORT:-8011}:8011"
    environment:
      - IS_DOCKER=true
      - IS_PROD=true
      - DATABASE_URL=${RDS_DATABASE_URL}
      - SCAN_SERVICE_URL=http://scan-service:8012
      - SCAN_SERVICE_INTERNAL_API_KEY=${SCAN_SERVICE_INTERNAL_API_KEY:-}
      - SCHEDULED_SCAN_INITIAL_DELAY_SECONDS=${SCHEDULED_SCAN_INITIAL_DELAY_SECONDS:-60}
      - SCHEDULED_SCAN_INTERVAL_SECONDS=${SCHEDULED_SCAN_INTERVAL_SECONDS:-300}
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  scan-service:
    build:
      context: .
      dockerfile: scan-service/Dockerfile
    container_name: immosphere-scan-service
    ports:
      - "${SCAN_PORT:-8012}:8012"
    environment:
      - IS_DOCKER=true
      - IS_PROD=true
      - DATABASE_URL=${RDS_DATABASE_URL}
      - SCAN_SERVICE_INTERNAL_API_KEY=${SCAN_SERVICE_INTERNAL_API_KEY:-}
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  crawl-service:
    build:
      context: .
      dockerfile: crawl-service/Dockerfile
    container_name: immosphere-crawl-service
    ports:
      - "${CRAWL_PORT:-8014}:8014"
    environment:
      - IS_DOCKER=true
      - IS_PROD=true
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8014/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pdf-service:
    build:
      context: .
      dockerfile: pdf-service/Dockerfile
    container_name: immosphere-pdf-service
    ports:
      - "${PDF_PORT:-8013}:8013"
    environment:
      - IS_DOCKER=true
      - DATABASE_URL=${RDS_DATABASE_URL}
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL est géré par AWS RDS - pas besoin de conteneur local
  # Les services utilisent RDS_DATABASE_URL pour se connecter

networks:
  app-network:
    driver: bridge
    name: immosphere-network
