services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: immosphere-gateway
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      - IS_DOCKER=true
      - ADMIN_METRICS_API_KEY=${ADMIN_METRICS_API_KEY:-changeme-in-production}
      - USER_SERVICE_INTERNAL_API_KEY=${USER_SERVICE_INTERNAL_API_KEY:-dev-user-service-internal-key}
      - DISABLE_AUTH_MIDDLEWARE=${DISABLE_AUTH_MIDDLEWARE:-false}
      - AWS_REGION=${AWS_REGION:-eu-west-3}
      - COGNITO_REGION=${COGNITO_REGION:-eu-west-3}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      admin-service:
        condition: service_started
      user-service:
        condition: service_started
      scan-service:
        condition: service_started
      crawl-service:
        condition: service_started
      pdf-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  admin-service:
    build:
      context: .
      dockerfile: admin-service/Dockerfile
    container_name: immosphere-admin
    ports:
      - "${ADMIN_PORT:-8010}:8010"
    environment:
      - IS_DOCKER=true
      - IS_PROD=true
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - ADMIN_METRICS_API_KEY=${ADMIN_METRICS_API_KEY:-changeme-in-production}
      - COGNITO_REGION=${COGNITO_REGION:-eu-west-3}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: immosphere-user-service
    ports:
      - "${USER_PORT:-8011}:8011"
    environment:
      - IS_DOCKER=true
      - IS_PROD=true
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - COGNITO_REGION=${COGNITO_REGION:-eu-west-3}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - SCAN_SERVICE_URL=http://scan-service:8012
      - SCAN_SERVICE_INTERNAL_API_KEY=${SCAN_SERVICE_INTERNAL_API_KEY:-}
      - ADMIN_SERVICE_URL=http://admin-service:8010
      - ADMIN_SERVICE_INTERNAL_API_KEY=${ADMIN_SERVICE_INTERNAL_API_KEY:-}
      - USER_SERVICE_INTERNAL_API_KEY=${USER_SERVICE_INTERNAL_API_KEY:-dev-user-service-internal-key}
      - SCHEDULED_SCAN_INITIAL_DELAY_SECONDS=${SCHEDULED_SCAN_INITIAL_DELAY_SECONDS:-60}
      - SCHEDULED_SCAN_INTERVAL_SECONDS=${SCHEDULED_SCAN_INTERVAL_SECONDS:-300}
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  scan-service:
    build:
      context: .
      dockerfile: scan-service/Dockerfile
    container_name: immosphere-scan-service
    ports:
      - "${SCAN_PORT:-8012}:8012"
    environment:
      - IS_DOCKER=true
      - IS_PROD=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - SCAN_SERVICE_INTERNAL_API_KEY=${SCAN_SERVICE_INTERNAL_API_KEY:-}
      - PDF_SERVICE_URL=http://pdf-service:8013
      - PDF_SERVICE_INTERNAL_API_KEY=${PDF_SERVICE_INTERNAL_API_KEY:-}
      - ASYNC_JOB_TOKEN_SECRET=${ASYNC_JOB_TOKEN_SECRET:-dev-async-job-secret}
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8012/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  scan-worker:
    build:
      context: .
      dockerfile: scan-service/Dockerfile
    container_name: immosphere-scan-worker
    command: ["python", "-m", "app.workers.async_scan_worker"]
    environment:
      - IS_DOCKER=true
      - IS_PROD=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - ASYNC_JOB_TOKEN_SECRET=${ASYNC_JOB_TOKEN_SECRET:-dev-async-job-secret}
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      scan-service:
        condition: service_started

  crawl-service:
    build:
      context: .
      dockerfile: crawl-service/Dockerfile
    container_name: immosphere-crawl-service
    ports:
      - "${CRAWL_PORT:-8014}:8014"
    environment:
      - IS_DOCKER=true
      - IS_PROD=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - ASYNC_JOB_TOKEN_SECRET=${ASYNC_JOB_TOKEN_SECRET:-dev-async-job-secret}
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8014/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  crawl-worker:
    build:
      context: .
      dockerfile: crawl-service/Dockerfile
    container_name: immosphere-crawl-worker
    command: ["python", "-m", "app.workers.async_crawl_worker"]
    environment:
      - IS_DOCKER=true
      - IS_PROD=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - ASYNC_JOB_TOKEN_SECRET=${ASYNC_JOB_TOKEN_SECRET:-dev-async-job-secret}
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
      crawl-service:
        condition: service_started

  pdf-service:
    build:
      context: .
      dockerfile: pdf-service/Dockerfile
    container_name: immosphere-pdf-service
    ports:
      - "${PDF_PORT:-8013}:8013"
    environment:
      - IS_DOCKER=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - PDF_SERVICE_INTERNAL_API_KEY=${PDF_SERVICE_INTERNAL_API_KEY:-}
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8013/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgis/postgis:15-3.3
    container_name: immosphere-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-template_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../docker/initdb.d:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge
    name: immosphere-network

volumes:
  pgdata:
