# Configuration pour l'API Gateway
# Ce fichier contient tous les paramètres de configuration du service

# Configuration générale
general:
  project_name: "API Gateway"
  debug: false  # true pour le développement, false pour la production
  is_docker: false  # Sera défini par la variable d'environnement IS_DOCKER

# Configuration CORS
# Avec allow_credentials: true, le navigateur refuse "*" ; il faut des origines explicites.
# Inclure tous les ports utilisés en local (3000, 4000, 3001, etc.).
# Pour accès réseau WiFi (ex. http://192.168.1.198:3000), ajouter l’origine correspondante.
cors:
  allow_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    - "http://192.168.1.198:3000"
    - "http://localhost:4000"
    - "http://127.0.0.1:4000"
  allow_methods: ["*"]
  allow_headers: ["*"]
  allow_credentials: true

# Configuration des services
services:
  # Configuration pour l'environnement Docker
  docker:
    admin:
      prefix: "admin"
      url: "http://admin-service:8010"
    user:
      prefix: "user"
      url: "http://user-service:8011"
    scan:
      prefix: "scan"
      url: "http://scan-service:8012"
    crawl:
      prefix: "crawl"
      url: "http://crawl-service:8014"
    pdf:
      prefix: "pdf"
      url: "http://pdf-service:8013"

  # Configuration pour l'environnement local
  local:
    admin:
      prefix: "admin"
      url: "http://localhost:8010"
    user:
      prefix: "user"
      url: "http://localhost:8011"
    scan:
      prefix: "scan"
      url: "http://localhost:8012"
    crawl:
      prefix: "crawl"
      url: "http://localhost:8014"
    pdf:
      prefix: "pdf"
      url: "http://localhost:8013"

# Configuration des timeouts
timeouts:
  request_timeout: 20.0  # Timeout en secondes pour les requêtes HTTP
  crawl_timeout: 90.0    # Timeout pour POST /crawl/api/crawl (crawl SPA peut prendre 60s+)

# Configuration des headers
headers:
  # Headers « hop-by-hop » à ne pas proxyer
  hop_by_hop:
    - "connection"
    - "keep-alive"
    - "proxy-authenticate"
    - "proxy-authorization"
    - "te"
    - "trailers"
    - "transfer-encoding"
    - "upgrade"
