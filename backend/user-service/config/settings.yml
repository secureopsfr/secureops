general:
  service_name: "user-service"
  environment: "development"
  cors_allow_origins:
    - "*"
  # URL de connexion à la base PostgreSQL : utiliser la variable d'environnement DATABASE_URL.
  # Ne jamais mettre de credentials ici — cf. .env.example pour le format attendu.

server:
  host: "0.0.0.0"
  port: 8011

logging:
  level: "INFO"

# Configuration de la base de données
database:
  pool_size: 20
  max_overflow: 30
  pool_timeout: 30
  pool_recycle: 3600
  pool_pre_ping: true
  echo: false
  connect_args:
    server_settings:
      application_name: "user-service"
  ssl_mode: "prefer"
  pool_logging: false

routers:
  health:
    prefix: "/api"
    tags:
      - "health"
