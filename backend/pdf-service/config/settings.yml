general:
  service_name: "pdf-service"
  environment: "development"
  cors_allow_origins:
    - "*"
  # Pas de BDD : le service ne fait que générer des PDF.

server:
  host: "0.0.0.0"
  port: 8013

logging:
  level: "INFO"

database:
  pool_size: 5
  max_overflow: 5
  pool_timeout: 30
  pool_recycle: 3600
  pool_pre_ping: true
  echo: false
  connect_args:
    server_settings:
      application_name: "pdf-service"
  ssl_mode: "prefer"
  pool_logging: false

routers:
  health:
    prefix: "/api"
    tags:
      - "health"

# PDF (rapport de scan) : catégories, libellés i18n, footer.
pdf:
  footer_url: "https://secureops.example.com"
  categories:
    order:
      - tls
      - headers
      - cache
      - integrity
      - cookies
      - exposed_files
      - directory_listing
      - robots_txt
      - sitemap
      - tech_fingerprinting
      - information_disclosure
      - cors_cross_origin
      - other
    checked:
      - tls
      - headers
      - cache
      - integrity
      - cookies
      - exposed_files
      - directory_listing
      - robots_txt
      - sitemap
      - tech_fingerprinting
      - information_disclosure
      - cors_cross_origin
    labels_fr:
      tls: "TLS / HTTPS"
      headers: "Security Headers"
      cache: "Cache et performances"
      integrity: "Intégrité et sous-ressources"
      cookies: "Cookies"
      exposed_files: "Fichiers exposés"
      directory_listing: "Directory listing"
      robots_txt: "robots.txt"
      sitemap: "Sitemap"
      tech_fingerprinting: "Tech fingerprinting"
      information_disclosure: "Fuites d'information"
      cors_cross_origin: "CORS et cross-origin"
      other: "Autres"
    labels_en:
      tls: "TLS / HTTPS"
      headers: "Security Headers"
      cache: "Cache and performance"
