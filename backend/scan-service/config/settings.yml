general:
  service_name: "scan-service"
  environment: "development"
  cors_allow_origins:
    - "*"
  # URL de connexion : utiliser la variable d'environnement DATABASE_URL.

server:
  host: "0.0.0.0"
  port: 8012

logging:
  level: "INFO"

database:
  pool_size: 20
  max_overflow: 30
  pool_timeout: 30
  pool_recycle: 3600
  pool_pre_ping: true
  echo: false
  connect_args:
    server_settings:
      application_name: "scan-service"
  ssl_mode: "prefer"
  pool_logging: false

routers:
  health:
    prefix: "/api"
    tags:
      - "health"
