services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://gateway:8000
      - NEXT_PUBLIC_IS_BETA_TEST=true
      - NEXT_PUBLIC_IS_PROD=false
    networks:
      - app-network
    depends_on:
      gateway:
        condition: service_healthy

  gateway:
    build:
      context: ./backend
      dockerfile: gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Indiquer que nous sommes en mode Docker
      - IS_DOCKER=true
      - ADMIN_METRICS_API_KEY=${ADMIN_METRICS_API_KEY:-dev-admin-metrics-key}
      - PDF_SERVICE_INTERNAL_API_KEY=${PDF_SERVICE_INTERNAL_API_KEY:-}
      # Quota journalier (gateway → user-service) : même valeur que user-service
      - USER_SERVICE_INTERNAL_API_KEY=${USER_SERVICE_INTERNAL_API_KEY:-dev-user-service-internal-key}
      # JWT (obligatoire pour /user/*, /scan/api/scan/multi-async, etc.)
      - COGNITO_REGION=${COGNITO_REGION:-eu-west-3}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID:-}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID:-}
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      admin-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      scan-service:
        condition: service_healthy
      crawl-service:
        condition: service_healthy
      pdf-service:
        condition: service_healthy
      postgres:
        condition: service_healthy

  admin-service:
    build:
      context: ./backend
      dockerfile: admin-service/Dockerfile
    ports:
      - "8010:8010"
    environment:
      - IS_DOCKER=true
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - ADMIN_METRICS_API_KEY=${ADMIN_METRICS_API_KEY:-dev-admin-metrics-key}
      - ADMIN_SERVICE_INTERNAL_API_KEY=${ADMIN_SERVICE_INTERNAL_API_KEY:-}
      - COGNITO_REGION=${COGNITO_REGION:-eu-west-3}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID:-}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID:-}
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build:
      context: ./backend
      dockerfile: user-service/Dockerfile
    ports:
      - "8011:8011"
    environment:
      - IS_DOCKER=true
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - COGNITO_REGION=${COGNITO_REGION:-eu-west-3}
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID:-}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID:-}
      # Ne pas injecter AWS_ACCESS_KEY_* ici : sur EC2, boto3 doit utiliser le rôle instance
      # pour Cognito (AdminGetUser). Des clés .env différentes du compte du pool → ResourceNotFoundException.
      - SCAN_SERVICE_URL=http://scan-service:8012
      - SCAN_SERVICE_INTERNAL_API_KEY=${SCAN_SERVICE_INTERNAL_API_KEY:-}
      - ADMIN_SERVICE_URL=http://admin-service:8010
      - ADMIN_SERVICE_INTERNAL_API_KEY=${ADMIN_SERVICE_INTERNAL_API_KEY:-}
      - USER_SERVICE_INTERNAL_API_KEY=${USER_SERVICE_INTERNAL_API_KEY:-dev-user-service-internal-key}
      - SCHEDULED_SCAN_INITIAL_DELAY_SECONDS=${SCHEDULED_SCAN_INITIAL_DELAY_SECONDS:-60}
      - SCHEDULED_SCAN_INTERVAL_SECONDS=${SCHEDULED_SCAN_INTERVAL_SECONDS:-300}
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8011/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  scan-service:
    build:
      context: ./backend
      dockerfile: scan-service/Dockerfile
    ports:
      - "8012:8012"
    environment:
      - IS_DOCKER=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      # PDF export + save historique : appels user-service via le gateway (pas localhost dans le conteneur)
      - GATEWAY_URL=http://gateway:8000
      - SCAN_SERVICE_INTERNAL_API_KEY=${SCAN_SERVICE_INTERNAL_API_KEY:-}
      - PDF_SERVICE_URL=http://pdf-service:8013
      - PDF_SERVICE_INTERNAL_API_KEY=${PDF_SERVICE_INTERNAL_API_KEY:-}
      - ASYNC_JOB_TOKEN_SECRET=${ASYNC_JOB_TOKEN_SECRET:-dev-async-job-secret}
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8012/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  scan-worker:
    build:
      context: ./backend
      dockerfile: scan-service/Dockerfile
    command: ["python", "-m", "app.workers.async_scan_worker"]
    environment:
      - IS_DOCKER=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - ASYNC_JOB_TOKEN_SECRET=${ASYNC_JOB_TOKEN_SECRET:-dev-async-job-secret}
    networks:
      - app-network
    depends_on:
      scan-service:
        condition: service_healthy
      postgres:
        condition: service_healthy

  crawl-service:
    build:
      context: ./backend
      dockerfile: crawl-service/Dockerfile
    ports:
      - "8014:8014"
    environment:
      - IS_DOCKER=true
      - IS_PROD=false
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - ASYNC_JOB_TOKEN_SECRET=${ASYNC_JOB_TOKEN_SECRET:-dev-async-job-secret}
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8014/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  crawl-worker:
    build:
      context: ./backend
      dockerfile: crawl-service/Dockerfile
    command: ["python", "-m", "app.workers.async_crawl_worker"]
    environment:
      - IS_DOCKER=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - ASYNC_JOB_TOKEN_SECRET=${ASYNC_JOB_TOKEN_SECRET:-dev-async-job-secret}
    networks:
      - app-network
    depends_on:
      crawl-service:
        condition: service_healthy
      postgres:
        condition: service_healthy

  pdf-service:
    build:
      context: ./backend
      dockerfile: pdf-service/Dockerfile
    ports:
      - "8013:8013"
    environment:
      - IS_DOCKER=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-template_db}
      - PDF_SERVICE_INTERNAL_API_KEY=${PDF_SERVICE_INTERNAL_API_KEY:-}
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8013/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-template_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/initdb.d:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5



networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
